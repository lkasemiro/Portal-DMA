<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso Técnico | Recicla CEDAE</title>

<link rel="stylesheet" href="./css/global.css">

<style>

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0b1324;
  font-family:system-ui;
}

.login-card{
  background:white;
  padding:40px;
  border-radius:12px;
  width:340px;
  box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.login-card h1{
  margin-bottom:20px;
  font-size:20px;
}

.login-card label{
  font-size:14px;
  display:block;
  margin-top:12px;
}

.login-card input{
  width:100%;
  padding:10px;
  margin-top:4px;
  border-radius:6px;
  border:1px solid #ccc;
}

.login-card button{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#0b66c3;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.login-error{
  color:#ef4444;
  margin-top:10px;
  font-size:13px;
}

</style>

</head>

<body>

<div class="login-card">

<h1>Acesso Técnico</h1>

<label>Usuário</label>
<input id="username">

<label>Senha</label>
<input id="password" type="password">

<button id="loginBtn">Entrar</button>

<div id="loginError" class="login-error"></div>

</div>

<script src="./js/auth.js"></script>

</body>
</html>
